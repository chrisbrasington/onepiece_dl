# One Piece pipeline — one shared storage volume, four small services.
# All config/secrets come from .env (see .env.example). Bring it all up with:
#   docker compose up -d --build
#
# Storage layout lives under /data (the one_piece_storage volume), shared by
# every service. The downloader produces; bot/calibre/webapp consume.

services:
  downloader:
    build:
      context: .
      dockerfile: services/downloader/Dockerfile
    image: valhalla:5000/one-piece-downloader:latest
    container_name: one-piece-downloader
    restart: always
    env_file: .env
    environment:
      TZ: America/Denver
      ONEPIECE_STORAGE: /data
    volumes:
      - ${STORAGE_PATH:-./data}:/data
    labels:
      - homepage.group=One Piece
      - homepage.name=Downloader
      - homepage.icon=mdi-download
      - homepage.description=Fetches new chapters

  bot:
    build:
      context: .
      dockerfile: services/bot/Dockerfile
    image: valhalla:5000/one-piece-bot:latest
    container_name: one-piece-bot
    restart: always
    env_file: .env
    environment:
      TZ: America/Denver
      ONEPIECE_STORAGE: /data
    volumes:
      - ${STORAGE_PATH:-./data}:/data
    depends_on:
      - downloader
    labels:
      - homepage.group=One Piece
      - homepage.name=Discord Bot
      - homepage.icon=discord
      - homepage.description=Auto-posts chapters

  calibre-uploader:
    build:
      context: .
      dockerfile: services/calibre/Dockerfile
    image: valhalla:5000/one-piece-calibre:latest
    container_name: one-piece-calibre
    restart: always
    env_file: .env
    environment:
      TZ: America/Denver
      ONEPIECE_STORAGE: /data
    volumes:
      - ${STORAGE_PATH:-./data}:/data
    # Calibre-Web runs on the host (published port 8083), not in this stack.
    # host.docker.internal resolves to the host from inside the container, so
    # set CALIBRE_URL=http://host.docker.internal:8083 in .env.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - downloader
    labels:
      - homepage.group=One Piece
      - homepage.name=Calibre Uploader
      - homepage.icon=calibre-web
      - homepage.description=Pushes chapters to Calibre-Web

  webapp:
    build:
      context: .
      dockerfile: services/webapp/Dockerfile
    image: valhalla:5000/one-piece-webapp:latest
    container_name: one-piece-webapp
    restart: always
    env_file: .env
    environment:
      TZ: America/Denver
      ONEPIECE_STORAGE: /data
      WEBAPP_PORT: 8080
    ports:
      - "8680:8080"   # host:container — change the host port to taste
    volumes:
      - ${STORAGE_PATH:-./data}:/data
    depends_on:
      - downloader
    networks:
      # default keeps it on the stack's own network; homepage is a shared
      # external network so the Homepage container can resolve this by name.
      - default
      - homepage
    labels:
      - homepage.group=Media
      - homepage.name=One Piece Library
      - homepage.icon=mdi-book-open-page-variant
      - homepage.href=https://onepiece.home.chrisincode.com
      - homepage.description=Browse, read & download chapters
      - homepage.widget.type=customapi
      - homepage.widget.url=http://one-piece-webapp:8080/api/stats
      - homepage.widget.refreshInterval=60000
      - homepage.widget.mappings[0].label=Last Chapter
      - homepage.widget.mappings[0].field=last_chapter
      - homepage.widget.mappings[1].label=Files
      - homepage.widget.mappings[1].field=file_count
      - homepage.widget.mappings[2].label=Pending
      - homepage.widget.mappings[2].field=pending_requests
      - homepage.widget.mappings[3].label=Last Check
      - homepage.widget.mappings[3].field=last_check
      - homepage.widget.mappings[3].format=relativeDate

networks:
  # Shared with the Homepage stack so its container can resolve one-piece-webapp
  # by name. Create once on the host: docker network create homepage
  homepage:
    external: true
