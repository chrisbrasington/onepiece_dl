<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One Piece Library</title>
<style>
  :root{
    --bg:#0e0f13; --panel:#15171d; --line:#23262f; --ink:#e8e6e1;
    --muted:#9aa0ab; --straw:#ffd23f; --red:#e4474b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#15171d,#121319);
    border-bottom:1px solid var(--line);padding:.9rem 1.2rem;
    display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
  header h1{font-size:1.15rem;margin:0;letter-spacing:.3px}
  header h1 b{color:var(--straw)}
  .count{color:var(--muted);font-size:.85rem}
  .req{margin-left:auto;display:flex;gap:.5rem;align-items:center}
  .req input{width:7rem;background:#0e0f13;border:1px solid var(--line);
    color:var(--ink);border-radius:8px;padding:.45rem .6rem}
  .req button,.pill{cursor:pointer;border:0;border-radius:8px;
    padding:.6rem 1rem;font-weight:600;font-size:.95rem}
  .req button{background:var(--straw);color:#1a1a1a}
  .req button:hover{filter:brightness(1.08)}
  #pending{display:flex;gap:.4rem;flex-wrap:wrap;padding:.6rem 1.2rem 0}
  .chip{background:#241f10;border:1px solid #3a3115;color:var(--straw);
    border-radius:999px;padding:.2rem .6rem;font-size:.8rem;
    display:inline-flex;align-items:center;gap:.35rem}
  .chip-x{background:none;border:0;color:var(--straw);cursor:pointer;
    font-size:.85rem;line-height:1;padding:0;opacity:.6}
  .chip-x:hover{opacity:1;color:#fff}
  main{padding:1.2rem;display:grid;gap:1.1rem;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;display:flex;flex-direction:column;transition:transform .12s,border-color .12s}
  .card:hover{transform:translateY(-3px);border-color:#39414f}
  .thumb{aspect-ratio:2/3;background:#0a0b0e;display:block;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb.ph{display:flex;align-items:center;justify-content:center;color:#3a4150;font-size:2.2rem}
  .meta{padding:.7rem .8rem;display:flex;flex-direction:column;gap:.15rem;flex:1}
  .ch{color:var(--straw);font-weight:700;font-size:.8rem;letter-spacing:.4px}
  .ttl{font-size:.92rem;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;
    -webkit-box-orient:vertical;overflow:hidden}
  .sub{color:var(--muted);font-size:.74rem;margin-top:.1rem}
  .actions{display:flex;border-top:1px solid var(--line)}
  .actions a{flex:1;text-align:center;padding:.55rem;color:var(--ink);
    text-decoration:none;font-size:.85rem;font-weight:600}
  .actions a:hover{background:#1b1e26}
  .actions a+a{border-left:1px solid var(--line)}
  .actions a.dl{color:var(--muted)}
  .actions a.make{color:var(--straw);cursor:pointer}
  .actions a.make.busy{color:var(--muted);pointer-events:none}
  .empty{color:var(--muted);padding:2rem 1.2rem}
  .toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);
    background:#1b1e26;border:1px solid var(--line);color:var(--ink);
    padding:.6rem 1rem;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .sched{margin:.7rem 1.2rem 0;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:.7rem .9rem;display:flex;flex-direction:column;gap:.6rem}
  .sched-status{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;font-size:.9rem}
  .sched-status .lbl{color:var(--muted)}
  .sched-status .val{font-weight:600}
  .badge{font-size:.68rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
    border-radius:999px;padding:.18rem .55rem}
  .badge.auto{background:#1b2330;border:1px solid #2b3a4f;color:#7fb0e6}
  .badge.manual{background:#241f10;border:1px solid #3a3115;color:var(--straw)}
  .sched-edit{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);
    border-radius:8px;padding:.35rem .7rem;cursor:pointer;font-size:.82rem;font-weight:600}
  .sched-edit:hover{color:var(--ink);border-color:#39414f}
  .sched-form{display:none;flex-wrap:wrap;gap:.5rem;align-items:center;
    border-top:1px solid var(--line);padding-top:.6rem}
  .sched-form.open{display:flex}
  .sched-form label{color:var(--muted);font-size:.78rem;display:flex;flex-direction:column;gap:.2rem}
  .sched-form input,.sched-form select{background:#0e0f13;border:1px solid var(--line);
    color:var(--ink);border-radius:8px;padding:.4rem .55rem;font-size:.9rem}
  .sched-form input[type=number]{width:4.5rem}
  .sched-form .set{background:var(--straw);color:#1a1a1a;border:0;border-radius:8px;
    padding:.5rem .9rem;font-weight:600;cursor:pointer;align-self:flex-end}
  .sched-form .clear{background:none;border:1px solid var(--line);color:var(--muted);
    border-radius:8px;padding:.5rem .8rem;cursor:pointer;font-weight:600;align-self:flex-end}
  .sched-form .clear:hover{color:var(--red);border-color:var(--red)}
</style>
</head>
<body>
  <header>
    <h1>🏴‍☠️ <b>One Piece</b> Library</h1>
    <span class="count" id="count"></span>
    <form class="req" id="reqForm">
      <input id="reqNum" type="number" min="1" placeholder="Chapter #" required>
      <button type="submit">Request</button>
    </form>
  </header>
  <div id="pending"></div>
  <section class="sched" id="sched" hidden>
    <div class="sched-status">
      <span class="lbl">Next chapter:</span>
      <span id="schedBadge" class="badge"></span>
      <span class="val" id="schedVal"></span>
      <button class="sched-edit" id="schedEdit" type="button">Set date</button>
    </div>
    <form class="sched-form" id="schedForm">
      <label>Date
        <input id="schedDate" type="date" required>
      </label>
      <label>Hour (optional)
        <input id="schedHour" type="number" min="0" max="23" placeholder="0–23">
      </label>
      <label>Timezone
        <select id="schedTz"></select>
      </label>
      <button class="set" type="submit">Set</button>
      <button class="clear" id="schedClear" type="button">Use auto-guess</button>
    </form>
  </section>
  <main id="grid"><div class="empty">Loading…</div></main>
  <div class="toast" id="toast"></div>

<script>
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const pendingEl = document.getElementById('pending');
const toastEl = document.getElementById('toast');

function toast(msg){
  toastEl.textContent = msg; toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'), 2200);
}

function card(c){
  const thumb = c.has_preview
    ? `<a class="thumb" href="/read/${c.chapter}"><img src="/preview/${c.chapter}" alt="Ch ${c.chapter}" loading="lazy" decoding="async"></a>`
    : `<a class="thumb ph" href="/read/${c.chapter}">📖</a>`;
  const pages = c.pages ? `${c.pages} pages` : '';
  const cbz = c.has_cbz
    ? `<a class="dl" href="/cbz/${c.chapter}">CBZ</a>`
    : `<a class="make" onclick="makeCbz(${c.chapter}, this)">Make CBZ</a>`;
  return `<div class="card">
    ${thumb}
    <div class="meta">
      <span class="ch">CHAPTER ${c.chapter}</span>
      <span class="ttl">${escapeHtml(c.title)}</span>
      <span class="sub">${pages}</span>
    </div>
    <div class="actions">
      <a href="/read/${c.chapter}">Read</a>
      <a class="dl" href="/pdf/${c.chapter}?dl=1">PDF</a>
      ${cbz}
    </div>
  </div>`;
}

async function makeCbz(n, el){
  el.classList.add('busy');
  el.textContent = 'Building…';
  try{
    const res = await fetch(`/api/cbz/${n}`, {method:'POST'});
    if(res.ok){
      const r = await res.json();
      toast(r.status === 'present' ? `CBZ for ${n} already exists` : `Built CBZ for chapter ${n}`);
      loadChapters();
    } else {
      toast('CBZ build failed');
      el.classList.remove('busy');
      el.textContent = 'Make CBZ';
    }
  } catch(e) {
    toast('CBZ build failed');
    el.classList.remove('busy');
    el.textContent = 'Make CBZ';
  }
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function loadChapters(){
  const res = await fetch('/api/chapters');
  const data = await res.json();
  countEl.textContent = data.length ? `${data.length} chapters` : '';
  grid.innerHTML = data.length
    ? data.map(card).join('')
    : '<div class="empty">No chapters yet. Request one above — the downloader will fetch it.</div>';
}

async function loadPending(){
  const res = await fetch('/api/requests');
  const {pending} = await res.json();
  pendingEl.innerHTML = pending && pending.length
    ? 'Requested: ' + pending.map(n=>`<span class="chip">#${n}<button class="chip-x" title="Cancel request" onclick="cancelRequest(${n})">✕</button></span>`).join(' ')
    : '';
}

async function cancelRequest(n){
  const res = await fetch(`/api/request/${n}`, {method:'DELETE'});
  toast(res.ok ? `Cancelled request #${n}` : 'Cancel failed');
  loadPending();
}

document.getElementById('reqForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const n = parseInt(document.getElementById('reqNum').value, 10);
  if(!n) return;
  const res = await fetch(`/api/request/${n}`, {method:'POST'});
  if(res.ok){
    const r = await res.json();
    toast(r.status === 'present' ? `Chapter ${n} is already here` : `Requested chapter ${n}`);
    document.getElementById('reqNum').value='';
    loadPending();
  } else {
    toast('Request failed');
  }
});

const schedEl = document.getElementById('sched');
const schedBadge = document.getElementById('schedBadge');
const schedVal = document.getElementById('schedVal');
const schedForm = document.getElementById('schedForm');
const schedTz = document.getElementById('schedTz');
let tzInit = false;

function fmtDate(iso){
  // iso = YYYY-MM-DD; render without pulling in timezone shifts.
  if(!iso) return 'unknown';
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString(undefined,
    {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}

async function loadSchedule(){
  const res = await fetch('/api/schedule');
  if(!res.ok) return;
  const s = await res.json();
  if(!tzInit && s.zones){
    schedTz.innerHTML = s.zones.map(z=>`<option value="${z.id}">${escapeHtml(z.label)}</option>`).join('');
    tzInit = true;
  }
  if(s.mode === 'manual'){
    schedBadge.textContent = 'Set by you';
    schedBadge.className = 'badge manual';
    schedVal.textContent = s.display || s.at;
    if(s.local_date) document.getElementById('schedDate').value = s.local_date;
    if(s.tz) schedTz.value = s.tz;
    if(typeof s.hour === 'number') document.getElementById('schedHour').value = s.hour;
  } else {
    schedBadge.textContent = 'Auto-guess';
    schedBadge.className = 'badge auto';
    schedVal.textContent = s.expected ? `next Sunday — ${fmtDate(s.expected)}` : 'unknown (no chapters yet)';
  }
  schedEl.hidden = false;
}

document.getElementById('schedEdit').addEventListener('click', ()=>{
  schedForm.classList.toggle('open');
});

schedForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const date = document.getElementById('schedDate').value;
  const hourRaw = document.getElementById('schedHour').value;
  if(!date){ toast('Pick a date'); return; }
  const body = {date, tz: schedTz.value};
  if(hourRaw !== '') body.hour = parseInt(hourRaw, 10);
  const res = await fetch('/api/schedule', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if(res.ok){
    schedForm.classList.remove('open');
    toast('Release date set');
    loadSchedule();
  } else {
    const err = await res.json().catch(()=>({}));
    toast(err.detail ? `Failed: ${err.detail}` : 'Failed to set date');
  }
});

document.getElementById('schedClear').addEventListener('click', async ()=>{
  const res = await fetch('/api/schedule', {method:'DELETE'});
  if(res.ok){
    schedForm.classList.remove('open');
    toast('Reverted to auto-guess');
    loadSchedule();
  } else {
    toast('Failed to clear');
  }
});

loadChapters();
loadPending();
loadSchedule();
setInterval(()=>{ loadChapters(); loadPending(); loadSchedule(); }, 30000);
</script>
</body>
</html>
